            html = html.replace(/^### (.*$)/gim, '<h4 class="text-lg font-bold mt-4 mb-2 text-gray-800">$1</h4>');
            html = html.replace(/^## (.*$)/gim, '<h3 class="text-xl font-bold mt-6 mb-3 text-gray-800">$1</h3>');
            html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/gim, '<em>$1</em>');
            
            html = html.replace(/^\* (.*$)/gim, '<li>$1</li>'); 
            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul class="list-disc list-inside space-y-1 mb-4 pl-4">$1</ul>');

            html = html.replace(/---/g, '<hr class="my-6 border-gray-300" />');

            const blocks = html.split('\n\n');
            html = blocks.map(block => {
                if (block.startsWith('<ul') || block.startsWith('<h') || block.startsWith('<hr')) {
                    return block;
                }
                if (block.startsWith('<li>')) {
                    return `<ul class="list-disc list-inside space-y-1 mb-4 pl-4">${block}</ul>`;
                }
                return `<p class="text-sm leading-relaxed">${block.replace(/\n/g, '<br />')}</p>`;
            }).join('');

                                <div className="flex-1"><h2 className="text-sm font-semibold text-teal-700">Homeowner Navigator</h2><p className="text-xs text-gray-500">Stage {currentStage} of 5</p></div>
                                <div className="flex space-x-1.5">{[1, 2, 3, 4, 5].map(stage => (<div key={stage} className={`w-10 h-2 rounded-full transition-colors ${currentStage >= stage ? 'bg-cyan-500' : 'bg-gray-300'}`} title={`Stage ${stage}`}></div>))}</div>
                            </div>
                        </div>
                        <div className="min-h-[600px] bg-white">{renderStage()}</div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
